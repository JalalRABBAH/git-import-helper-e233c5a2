        - name: actorId
          in: query
          schema: { type: string, format: uuid }
        - name: assignedTo
          in: query
          schema: { type: string, format: uuid }
        - name: dateFrom
          in: query
          schema: { type: string, format: date }
        - name: dateTo
          in: query
