          application/json:
            schema:
              type: object
              properties:
                assigneeId:
                  type: string
                  format: uuid
                notes:
                  type: string
      responses:
        '200':
          description: Alerte assignée
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
