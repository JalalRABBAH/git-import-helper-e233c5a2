      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Webhooks]
      summary: Tester un webhook
      description: Envoie un événement de test au webhook.
      responses:
        '200':
          description: Test effectué
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  responseStatus:
                    type: integer
                  responseTime:
                    type: integer
                    description: Temps de réponse en ms
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  # ========================================================================
  # SECURITY SCHEMES
  # ========================================================================
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT d'accès (RS256)
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Clé API pour les intégrations système (ministère, DGI)

  # ========================================================================
  # RESPONSES
  # ========================================================================
  responses:
    BadRequest:
      description: Requête invalide
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: Non authentifié — Token invalide ou expiré
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Forbidden:
      description: Accès interdit — Permissions insuffisantes
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Ressource non trouvée
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    TooManyRequests:
      description: Trop de requêtes — Rate limiting
      headers:
        X-RateLimit-Limit:
          schema: { type: integer }
        X-RateLimit-Remaining:
          schema: { type: integer }
        X-RateLimit-Reset:
          schema: { type: integer }
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    InternalError:
      description: Erreur interne du serveur
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  # ========================================================================
  # SCHEMAS
  # ========================================================================
  schemas:
    # -------------------------------------------------------------------------
    # Commons
    # -------------------------------------------------------------------------
    Error:
      type: object
      required: [statusCode, message]
      properties:
        statusCode:
          type: integer
          example: 400
        message:
          type: string
          example: "Le VIN fourni n'est pas valide"
        code:
          type: string
          example: INVALID_VIN
        details:
          type: object
        timestamp:
          type: string
          format: date-time
        path:
          type: string
          example: /api/v1/vehicles

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
        hasNext:
          type: boolean
        hasPrevious:
          type: boolean

    # -------------------------------------------------------------------------
    # Auth
    # -------------------------------------------------------------------------
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: contact@societe-import.bf
        password:
          type: string
          format: password
          minLength: 8
          example: ""
        deviceId:
          type: string
          description: Identifiant unique du device (PWA)
        deviceInfo:
          type: string

    LoginResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        mfaRequired:
          type: boolean
          description: true si MFA requis pour compléter l'auth
        tempToken:
          type: string
          description: Token temporaire pour vérification MFA
        accessToken:
          type: string
          description: JWT access token (si pas de MFA requis)
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: Durée de validité access token (secondes)
          example: 900
        user:
          $ref: '#/components/schemas/User'

    TokenRefreshResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        fullName:
          type: string
        phone:
          type: string
        roles:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
                enum: [SUPER_ADMIN, ADMIN_DRCTT, CONTROLEUR, IMPORTATEUR, DISTRIBUTEUR, ASSEMBLEUR, DETAILLANT, AUDITEUR, CNTI_AGENT]
              actorId:
                type: string
        permissions:
          type: array
          items:
            type: string
        locale:
          type: string
          example: fr_BF
        mfaEnabled:
          type: boolean
        actor:
          type: object
          properties:
            id:
              type: string
            companyName:
              type: string
            actorType:
              type: string

    # -------------------------------------------------------------------------
    # Acteurs
    # -------------------------------------------------------------------------
    Actor:
      type: object
      properties:
        id:
          type: string
          format: uuid
        actorType:
          type: string
          enum: [IMPORTATEUR, DISTRIBUTEUR, ASSEMBLEUR, DETAILLANT, PRESTATAIRE]
        status:
          type: string
          enum: [PENDING, ACTIVE, SUSPENDED, REVOKED, EXPIRED]
        companyName:
          type: string
        tradeName:
          type: string
        nif:
          type: string
        rccm:
          type: string
        legalRepresentativeName:
          type: string
        email:
          type: string
        phone:
          type: string
        addressLine1:
          type: string
        city:
          type: string
        region:
          type: string
        agreementStatus:
          type: string
        agreementNumber:
          type: string
        agreementExpiresAt:
          type: string
          format: date-time
        complianceScore:
          type: number
        complianceCountdownDays:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ActorDetail:
      allOf:
        - $ref: '#/components/schemas/Actor'
        - type: object
          properties:
            warehouses:
              type: array
              items:
                $ref: '#/components/schemas/Warehouse'
            documents:
              type: array
              items:
                $ref: '#/components/schemas/ActorDocument'
            parentActor:
              type: object
              properties:
                id:
                  type: string
                companyName:
                  type: string

    PaginatedActors:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Actor'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    CreateActorRequest:
      type: object
      required: [actorType, companyName, legalRepresentativeName, legalRepresentativePhone, email, phone, addressLine1, city, region, nif]
      properties:
        actorType:
          type: string
          enum: [IMPORTATEUR, DISTRIBUTEUR, ASSEMBLEUR, DETAILLANT, PRESTATAIRE]
        companyName:
          type: string
          maxLength: 255
        tradeName:
          type: string
        nif:
          type: string
        rccm:
          type: string
        legalRepresentativeName:
          type: string
        legalRepresentativeTitle:
          type: string
        legalRepresentativePhone:
          type: string
        legalRepresentativeEmail:
          type: string
        email:
          type: string
        phone:
          type: string
        alternatePhone:
          type: string
        addressLine1:
          type: string
        addressLine2:
          type: string
        city:
          type: string
        region:
          type: string
        postalCode:
          type: string
        gpsCoordinates:
          type: object
          properties:
            lat: { type: number }
            lng: { type: number }
        bankName:
          type: string
        bankAccount:
          type: string
        bankRib:
          type: string
        parentActorId:
          type: string
          format: uuid

    UpdateActorRequest:
      type: object
      properties:
        companyName: { type: string }
        tradeName: { type: string }
        legalRepresentativeName: { type: string }
        legalRepresentativePhone: { type: string }
        email: { type: string }
        phone: { type: string }
        addressLine1: { type: string }
        addressLine2: { type: string }
        city: { type: string }
        region: { type: string }
        gpsCoordinates:
          type: object
          properties:
            lat: { type: number }
            lng: { type: number }
        bankName: { type: string }
        bankAccount: { type: string }

    ActorDocument:
      type: object
      properties:
        id:
          type: string
        documentType:
          type: string
        documentLabel:
          type: string
        fileName:
          type: string
        fileSizeBytes:
          type: integer
        mimeType:
          type: string
        storageUrl:
          type: string
        checksumSha256:
          type: string
        issuedDate:
          type: string
          format: date
        expiryDate:
          type: string
          format: date
        isVerified:
          type: boolean
        verifiedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    Warehouse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        code:
          type: string
        addressLine1:
          type: string
        city:
          type: string
        region:
          type: string
        gpsCoordinates:
          type: object
          properties:
            lat: { type: number }
            lng: { type: number }
        isPrimary:
          type: boolean
        capacityUnits:
          type: integer
        surfaceSqm:
          type: number
        securityLevel:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreateWarehouseRequest:
      type: object
      required: [name, code, addressLine1, city, region]
      properties:
        name: { type: string }
        code: { type: string }
        addressLine1: { type: string }
        addressLine2: { type: string }
        city: { type: string }
        region: { type: string }
        gpsCoordinates:
          type: object
          properties:
            lat: { type: number }
            lng: { type: number }
        capacityUnits: { type: integer }
        surfaceSqm: { type: number }
        securityLevel:
          type: string
          enum: [STANDARD, RENFORCE, HAUTE]
        isPrimary: { type: boolean }

    # -------------------------------------------------------------------------
    # Véhicules
    # -------------------------------------------------------------------------
    Vehicle:
      type: object
      properties:
        id:
          type: string
        vin:
          type: string
        chassisNumber: { type: string }
        engineNumber: { type: string }
        manufacturer: { type: string }
        model: { type: string }
        modelYear: { type: integer }
        category: { type: string }
        categoryLabel: { type: string }
        fuelType: { type: string }
        transmission: { type: string }
        cylinderCapacityCc: { type: integer }
        powerKw: { type: number }
        weightKg: { type: number }
        color: { type: string }
        status: { type: string }
        qrCode: { type: string }
        homologationNumber: { type: string }
        homologationValidUntil:
          type: string
          format: date
        complianceStatus: { type: string }
        importDate:
          type: string
          format: date
        customsValue: { type: number }
        currentOwnerActorId: { type: string }
        currentWarehouseId: { type: string }
        createdAt:
          type: string
          format: date-time

    VehicleDetail:
      allOf:
        - $ref: '#/components/schemas/Vehicle'
        - type: object
          properties:
            ownershipHistory:
              type: array
              items:
                $ref: '#/components/schemas/VehicleOwnership'
            isBlacklisted:
              type: boolean
            blacklistInfo:
              type: object
              properties:
                reason: { type: string }
                reasonDetails: { type: string }
                reportedAt:
                  type: string
                  format: date-time

    PaginatedVehicles:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Vehicle'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    CreateVehicleRequest:
      type: object
      required: [vin, manufacturer, model, modelYear, categoryId, fuelType, cylinderCapacityCc]
      properties:
        vin:
          type: string
          pattern: '^[A-HJ-NPR-Z0-9]{17}$'
        chassisNumber: { type: string }
        engineNumber: { type: string }
        manufacturer: { type: string }
        model: { type: string }
        modelYear:
          type: integer
          minimum: 1990
          maximum: 2030
        categoryId:
          type: string
          format: uuid
        fuelType:
          type: string
          enum: [ESSENCE, DIESEL, ELECTRIQUE, HYBRIDE, GPL]
        transmission:
          type: string
          enum: [MANUELLE, AUTOMATIQUE, SEMI_AUTOMATIQUE, CONTINUOUSLY_VARIABLE]
        cylinderCapacityCc: { type: integer }
        powerKw: { type: number }
        weightKg: { type: number }
        color: { type: string }
        importCountryCode: { type: string }
        importDeclarationNumber: { type: string }
        importDate:
          type: string
          format: date
        customsValue: { type: number }
        originCertificateRef: { type: string }
        homologationNumber: { type: string }
        homologationValidUntil:
          type: string
          format: date

    UpdateVehicleRequest:
      type: object
      properties:
        color: { type: string }
        status:
          type: string
          enum: [IMPORTED, IN_STOCK, RESERVED, SOLD, REGISTERED, STOLEN, SCRAPPED, EXPORTED]
        currentWarehouseId:
          type: string
          format: uuid
        homologationNumber: { type: string }
        homologationValidUntil:
          type: string
          format: date

    VehicleOwnership:
      type: object
      properties:
        id: { type: string }
        vehicleId: { type: string }
        clientId: { type: string }
        clientName: { type: string }
        actorId: { type: string }
        actorName: { type: string }
        transferType: { type: string }
        ownershipStartedAt:
          type: string
          format: date-time
        ownershipEndedAt:
          type: string
          format: date-time
        isCurrent: { type: boolean }
        certificateNumber: { type: string }

    VehicleBlacklistEntry:
      type: object
      properties:
        id: { type: string }
        vehicleId: { type: string }
        vin: { type: string }
        reason:
          type: string
          enum: [STOLEN, FRAUD, COUNTERFEIT, NON_COMPLIANT, ADMIN_SEIZURE, INSURANCE_TOTAL_LOSS]
        reasonDetails: { type: string }
        source: { type: string }
        reportedBy: { type: string }
        reportedAt:
          type: string
          format: date-time
        isActive: { type: boolean }

    CreateBlacklistEntryRequest:
      type: object
      required: [vin, reason]
      properties:
        vehicleId:
          type: string
          format: uuid
        vin:
          type: string
        reason:
          type: string
          enum: [STOLEN, FRAUD, COUNTERFEIT, NON_COMPLIANT, ADMIN_SEIZURE, INSURANCE_TOTAL_LOSS]
        reasonDetails: { type: string }
        sourceReference: { type: string }

    # -------------------------------------------------------------------------
    # Stocks
    # -------------------------------------------------------------------------
    StockMovement:
      type: object
      properties:
        id: { type: string }
        vehicleId: { type: string }
        vehicleVin: { type: string }
        actorId: { type: string }
        warehouseId: { type: string }
        warehouseName: { type: string }
        movementType:
          type: string
          enum: [IMPORT, ASSEMBLY, TRANSFER, SALE, RETURN, ADJUSTMENT, SCRAP, RESERVATION, RELEASE]
        quantity: { type: integer }
        referenceDocument: { type: string }
        unitCost: { type: number }
        currencyCode: { type: string }
        notes: { type: string }
        performedBy: { type: string }
        movementDate:
          type: string
          format: date-time

    CreateStockMovementRequest:
      type: object
      required: [vehicleId, movementType]
      properties:
        vehicleId:
          type: string
          format: uuid
        movementType:
          type: string
          enum: [IMPORT, ASSEMBLY, TRANSFER, SALE, RETURN, ADJUSTMENT, SCRAP, RESERVATION, RELEASE]
        warehouseId:
          type: string
          format: uuid
        referenceDocument: { type: string }
        referenceSaleId:
          type: string
          format: uuid
        referenceTransferFrom:
          type: string
          format: uuid
        referenceTransferTo:
          type: string
          format: uuid
        unitCost: { type: number }
        currencyCode: { type: string }
        notes: { type: string }

    InventoryCount:
      type: object
      properties:
        id: { type: string }
        warehouseId: { type: string }
        warehouseName: { type: string }
        status:
          type: string
          enum: [PLANNED, IN_PROGRESS, COMPLETED, RECONCILED, DISCREPANCY_FOUND]
        plannedDate:
          type: string
          format: date
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        totalUnitsExpected: { type: integer }
        totalUnitsCounted: { type: integer }
        discrepancyUnits: { type: integer }
        discrepancyValue: { type: number }
        performedBy: { type: string }

    # -------------------------------------------------------------------------
    # Clients
    # -------------------------------------------------------------------------
    Client:
      type: object
      properties:
        id: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        fullName: { type: string }
        idDocumentType:
          type: string
          enum: [CNI, PASSPORT, CARTE_CONSULAIRE, NIF_CARD, PERMIS_CONDUIRE, CERTIFICAT_NAISSANCE]
        idDocumentNumber: { type: string }
        phone: { type: string }
        phone2: { type: string }
        email: { type: string }
        city: { type: string }
        region: { type: string }
        status:
          type: string
          enum: [PENDING_KYC, KYC_VERIFIED, KYC_REJECTED, BLACKLISTED]
        kycVerifiedAt:
          type: string
          format: date-time
        kycRiskLevel:
          type: string
          enum: [LOW, MEDIUM, HIGH]
        biometricEnrolled: { type: boolean }
        registeredByActorId: { type: string }
        vehicleCount: { type: integer }
        createdAt:
          type: string
          format: date-time

    ClientDetail:
      allOf:
        - $ref: '#/components/schemas/Client'
        - type: object
          properties:
            documents:
              type: array
              items:
                $ref: '#/components/schemas/ClientDocument'
            vehicles:
              type: array
              items:
                $ref: '#/components/schemas/VehicleOwnership'

    CreateClientRequest:
      type: object
      required: [firstName, lastName, idDocumentType, idDocumentNumber, phone]
      properties:
        firstName: { type: string }
        lastName: { type: string }
        idDocumentType:
          type: string
          enum: [CNI, PASSPORT, CARTE_CONSULAIRE, NIF_CARD, PERMIS_CONDUIRE, CERTIFICAT_NAISSANCE]
        idDocumentNumber: { type: string }
        idDocumentIssuedAt:
          type: string
          format: date
        idDocumentExpiresAt:
          type: string
          format: date
        idDocumentIssuedBy: { type: string }
        phone: { type: string }
        phone2: { type: string }
        email: { type: string }
        addressLine1: { type: string }
        addressLine2: { type: string }
        city: { type: string }
        region: { type: string }

    UpdateClientRequest:
      type: object
      properties:
        firstName: { type: string }
        lastName: { type: string }
        phone: { type: string }
        phone2: { type: string }
        email: { type: string }
        addressLine1: { type: string }
        city: { type: string }
        region: { type: string }

    ClientDocument:
      type: object
      properties:
        id: { type: string }
        documentType: { type: string }
        fileName: { type: string }
        fileSizeBytes: { type: integer }
        mimeType: { type: string }
        storageUrl: { type: string }
        isVerified: { type: boolean }
        verifiedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    # -------------------------------------------------------------------------
    # Ventes
    # -------------------------------------------------------------------------
    Sale:
      type: object
      properties:
        id: { type: string }
        actorId: { type: string }
        clientId: { type: string }
        clientName: { type: string }
        status:
          type: string
          enum: [DRAFT, PENDING_PAYMENT, PAID, PARTIALLY_PAID, CANCELLED, REFUNDED]
        paymentMethod:
          type: string
          enum: [CASH, BANK_TRANSFER, MOBILE_MONEY, CHEQUE, CREDIT, INSTALLMENT]
        subtotalAmount: { type: number }
        discountAmount: { type: number }
        taxAmount: { type: number }
        totalAmount: { type: number }
        currencyCode: { type: string }
        saleDate:
          type: string
          format: date-time
        invoiceNumber: { type: string }
        itemCount: { type: integer }
        createdAt:
          type: string
          format: date-time

    SaleDetail:
      allOf:
        - $ref: '#/components/schemas/Sale'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/SaleItem'
            taxBreakdown:
              type: object
            invoice:
              type: object
              properties:
                id: { type: string }
                invoiceNumber: { type: string }
                status: { type: string }
                pdfUrl: { type: string }

    PaginatedSales:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Sale'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    CreateSaleRequest:
      type: object
      required: [clientId, paymentMethod, items]
      properties:
        clientId:
          type: string
          format: uuid
        warehouseId:
          type: string
          format: uuid
        paymentMethod:
          type: string
          enum: [CASH, BANK_TRANSFER, MOBILE_MONEY, CHEQUE, CREDIT, INSTALLMENT]
        paymentReference: { type: string }
        discountAmount: { type: number }
        notes: { type: string }
        items:
          type: array
          items:
            type: object
            required: [vehicleId, unitPrice]
            properties:
              vehicleId:
                type: string
                format: uuid
              unitPrice: { type: number }
              quantity:
                type: integer
                default: 1
              discountAmount: { type: number }
        saleLocation:
          type: object
          properties:
            lat: { type: number }
            lng: { type: number }

    UpdateSaleRequest:
      type: object
      properties:
        discountAmount: { type: number }
        notes: { type: string }

    SaleItem:
      type: object
      properties:
        id: { type: string }
        vehicleId: { type: string }
        vehicleVin: { type: string }
        vehicleModel: { type: string }
        unitPrice: { type: number }
        quantity: { type: integer }
        lineTotal: { type: number }
        taxAmount: { type: number }
        marginAmount: { type: number }
        marginRate: { type: number }

    # -------------------------------------------------------------------------
    # Pricing
    # -------------------------------------------------------------------------
    PurchasePrice:
      type: object
      properties:
        id: { type: string }
        actorId: { type: string }
        vehicleCategoryId: { type: string }
        manufacturer: { type: string }
        model: { type: string }
        modelYear: { type: integer }
        unitPriceForeign: { type: number }
        foreignCurrencyCode: { type: string }
        exchangeRate: { type: number }
        unitPriceXof: { type: number }
        freightCost: { type: number }
        insuranceCost: { type: number }
        customsDuties: { type: number }
        otherCosts: { type: number }
        totalLandedCost: { type: number }
        supplierName: { type: string }
        supplierCountry: { type: string }
        effectiveDate:
          type: string
          format: date

    CreatePurchasePriceRequest:
      type: object
      required: [actorId, unitPriceForeign, foreignCurrencyCode, exchangeRate, totalLandedCost]
      properties:
        actorId:
          type: string
          format: uuid
        vehicleCategoryId:
          type: string
          format: uuid
        manufacturer: { type: string }
        model: { type: string }
        modelYear: { type: integer }
        unitPriceForeign: { type: number }
        foreignCurrencyCode:
          type: string
          default: EUR
        exchangeRate: { type: number }
        freightCost: { type: number }
        insuranceCost: { type: number }
        customsDuties: { type: number }
        otherCosts: { type: number }
        totalLandedCost: { type: number }
        supplierName: { type: string }
        supplierCountry: { type: string }
        effectiveDate:
          type: string
          format: date

    PricingHistoryEntry:
      type: object
      properties:
        id: { type: string }
        actorId: { type: string }
        vehicleCategory: { type: string }
        manufacturer: { type: string }
        model: { type: string }
        purchasePrice: { type: number }
        sellingPrice: { type: number }
        marginAmount: { type: number }
        marginRate: { type: number }
        isAnomaly: { type: boolean }
        anomalyType: { type: string }
        effectiveDate:
          type: string
          format: date

    # -------------------------------------------------------------------------
    # Conformité
    # -------------------------------------------------------------------------
    ComplianceRule:
      type: object
      properties:
        id: { type: string }
        code: { type: string }
        name: { type: string }
        description: { type: string }
        ruleType:
          type: string
          enum: [DOCUMENT, VEHICLE_SPEC, PRICING, STOCK, KYC, TIMING, CUSTOMS, TAX]
        severity:
          type: string
          enum: [INFO, WARNING, CRITICAL, BLOCKER]
        isActive: { type: boolean }
        validFrom:
          type: string
          format: date
        legalReference: { type: string }

    ComplianceChecklist:
      type: object
      properties:
        id: { type: string }
        actorId: { type: string }
        name: { type: string }
        checklistType: { type: string }
        status: { type: string }
        periodStart:
          type: string
          format: date
        periodEnd:
          type: string
          format: date
        totalRules: { type: integer }
        passedRules: { type: integer }
        failedRules: { type: integer }
        warningRules: { type: integer }
        completedAt:
          type: string
          format: date-time

    ComplianceChecklistItem:
      type: object
      properties:
        id: { type: string }
        ruleId: { type: string }
        ruleCode: { type: string }
        ruleName: { type: string }
        ruleType: { type: string }
        severity: { type: string }
        status: { type: string }
        observedValue: { type: string }
        expectedValue: { type: string }
        notes: { type: string }
        checkedAt:
          type: string
          format: date-time

    ComplianceScore:
      type: object
      properties:
        actorId: { type: string }
        overallScore: { type: number }
        documentScore: { type: number }
        vehicleScore: { type: number }
        pricingScore: { type: number }
        kycScore: { type: number }
        reportingScore: { type: number }
        stockScore: { type: number }
        rulesChecked: { type: integer }
        rulesPassed: { type: integer }
        rulesFailed: { type: integer }
        criticalFailures: { type: integer }
        alertLevel: { type: string }
        countdownDays: { type: integer }
        calculatedAt:
          type: string
          format: date-time

    # -------------------------------------------------------------------------
    # Sécurité
    # -------------------------------------------------------------------------
    FraudAlert:
      type: object
      properties:
        id: { type: string }
        alertType: { type: string }
        severity:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
        status:
          type: string
          enum: [OPEN, UNDER_INVESTIGATION, CONFIRMED, FALSE_POSITIVE, CLOSED, ESCALATED]
        title: { type: string }
        description: { type: string }
        detectedPattern: { type: string }
        riskScore: { type: number }
        riskFactors:
          type: array
          items: { type: string }
        vehicleId: { type: string }
        actorId: { type: string }
        clientId: { type: string }
        saleId: { type: string }
        assignedTo: { type: string }
        cntiNotifiedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    SecurityBlacklistEntry:
      type: object
      properties:
        id: { type: string }
        blacklistType: { type: string }
        entityId: { type: string }
        entityIdentifier: { type: string }
        reason: { type: string }
        reasonCategory: { type: string }
        source: { type: string }
        blacklistedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        isActive: { type: boolean }

    CreateSecurityBlacklistRequest:
      type: object
      required: [blacklistType, entityIdentifier, reason, reasonCategory]
      properties:
        blacklistType:
          type: string
          enum: [VEHICLE, CLIENT, ACTOR, USER, VIN_PATTERN]
        entityId:
          type: string
          format: uuid
        entityIdentifier: { type: string }
        reason: { type: string }
        reasonCategory:
          type: string
          enum: [FRAUD, THEFT, COUNTERFEIT, SANCTION]
        sourceReference: { type: string }
        expiresAt:
          type: string
          format: date-time

    TransactionFlag:
      type: object
      properties:
        id: { type: string }
        saleId: { type: string }
        flagType: { type: string }
        severity: { type: string }
        description: { type: string }
        riskScore: { type: number }
        isResolved: { type: boolean }
        createdAt:
          type: string
          format: date-time

    # -------------------------------------------------------------------------
    # Admin
    # -------------------------------------------------------------------------
    AdminDashboard:
      type: object
      properties:
        period:
          type: string
        generatedAt:
          type: string
          format: date-time
        kpi:
          type: object
          properties:
            totalActors:
              type: integer
            activeActors:
              type: integer
            pendingApprovals:
              type: integer
            totalVehicles:
              type: integer
            totalSales:
              type: integer
            totalRevenue:
              type: number
            avgComplianceScore:
              type: number
            criticalAlerts:
              type: integer
            overdueReports:
              type: integer
            inspectionsThisMonth:
              type: integer
        charts:
          type: object
          properties:
            salesByMonth:
              type: array
              items:
                type: object
                properties:
                  month: { type: string }
                  amount: { type: number }
            complianceByType:
              type: array
              items:
                type: object
                properties:
                  type: { type: string }
                  avgScore: { type: number }
            actorsByRegion:
              type: array
              items:
                type: object
                properties:
                  region: { type: string }
                  count: { type: integer }

    PaginatedAdminActors:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              companyName: { type: string }
              actorType: { type: string }
              status: { type: string }
              region: { type: string }
              agreementStatus: { type: string }
              complianceScore: { type: number }
              lastReportStatus: { type: string }
              vehicleCount: { type: integer }
              createdAt:
                type: string
                format: date-time
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    NationalAggregations:
      type: object
      properties:
        period:
          type: object
          properties:
            from:
              type: string
              format: date
            to:
              type: string
              format: date
        summary:
          type: object
          properties:
            totalActors: { type: integer }
            totalVehiclesRegistered: { type: integer }
            totalSales: { type: integer }
            totalRevenue: { type: number }
            totalTaxCollected: { type: number }
            avgComplianceScore: { type: number }
            sanctionsIssued: { type: integer }
        byRegion:
          type: array
          items:
            type: object
            properties:
              region: { type: string }
              actorCount: { type: integer }
              vehicleCount: { type: integer }
              salesAmount: { type: number }
              complianceScore: { type: number }
        byCategory:
          type: array
          items:
            type: object
            properties:
              category: { type: string }
              vehiclesImported: { type: integer }
              vehiclesSold: { type: integer }
              avgPrice: { type: number }
        topAlerts:
          type: array
          items:
            type: object
            properties:
              type: { type: string }
              count: { type: integer }
              severity: { type: string }

    # -------------------------------------------------------------------------
    # Webhooks
    # -------------------------------------------------------------------------
    WebhookEndpoint:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        url: { type: string }
        events:
          type: array
          items: { type: string }
        isActive: { type: boolean }
        lastDeliveredAt:
          type: string
          format: date-time
        lastDeliveryStatus: { type: string }
        deliveryCount: { type: integer }
        failureCount: { type: integer }
        createdAt:
          type: string
          format: date-time

    CreateWebhookRequest:
      type: object
      required: [name, url, events]
      properties:
        name: { type: string }
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
            enum: [sale.recorded, compliance.changed, fraud.alert, report.submitted, actor.created, vehicle.imported]
        secret: { type: string }
        retryMax: { type: integer, default: 3 }
        timeoutMs: { type: integer, default: 30000 }
