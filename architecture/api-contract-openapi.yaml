                notes:
                  type: string
      responses:
        '200':
          description: Alerte résolue
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /security/blacklist:
    get:
      tags: [Securite]
      summary: Liste noire de sécurité
      description: Entités blacklistées (véhicules, clients, acteurs).
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [VEHICLE, CLIENT, ACTOR, USER, VIN_PATTERN]
        - name: search
          in: query
          schema: { type: string }
        - name: isActive
          in: query
          schema: { type: boolean, default: true }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Liste noire
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SecurityBlacklistEntry'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Securite]
      summary: Ajouter une entrée à la liste noire
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSecurityBlacklistRequest'
      responses:
        '201':
          description: Entrée ajoutée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityBlacklistEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /security/flag-transaction:
    post:
      tags: [Securite]
      summary: Signaler une transaction suspecte
      description: >
        Signale manuellement une transaction comme suspecte.
        Déclenche une investigation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [saleId, flagType, description]
              properties:
                saleId:
                  type: string
                  format: uuid
                flagType:
                  type: string
                  enum: [PRICE_ANOMALY, VOLUME_ANOMALY, CIRCULAR_TRADE, BLACKLISTED_VEHICLE, SUSPICIOUS_CLIENT, GEO_ANOMALY, TIMING_ANOMALY, MULTIPLE_SAME_DAY]
                description:
                  type: string
                severity:
                  type: string
                  enum: [LOW, MEDIUM, HIGH, CRITICAL]
                  default: MEDIUM
      responses:
        '201':
          description: Transaction signalée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionFlag'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /security/verify-vin:
    get:
      tags: [Securite]
      summary: Vérifier un VIN (contrôleurs)
      description: >
        Vérifie rapidement si un VIN est enregistré,
        conforme, et s'il figure sur une liste noire.
        API optimisée pour les contrôleurs sur le terrain.
      parameters:
        - name: vin
          in: query
          required: true
          schema:
            type: string
            pattern: '^[A-HJ-NPR-Z0-9]{17}$'
      responses:
        '200':
          description: Résultat vérification
          content:
            application/json:
              schema:
                type: object
                properties:
                  vin:
                    type: string
                  isRegistered:
                    type: boolean
                  vehicle:
                    type: object
                    properties:
                      manufacturer:
                        type: string
                      model:
                        type: string
                      category:
                        type: string
                      status:
                        type: string
                  isBlacklisted:
                    type: boolean
                  blacklistInfo:
                    type: object
                    properties:
                      reason:
                        type: string
                      reasonDetails:
                        type: string
                      reportedAt:
                        type: string
                        format: date-time
                  isCompliant:
                    type: boolean
                  complianceScore:
                    type: number
                  ownerInfo:
                    type: object
                    properties:
                      actorName:
                        type: string
                      clientName:
                        type: string
                  lastVerifiedAt:
                    type: string
                    format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

