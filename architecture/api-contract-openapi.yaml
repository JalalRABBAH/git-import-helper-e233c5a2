openapi: 3.0.3
info:
  title: iReg Moto BF API
  description: >
    API réglementaire pour la conformité des deux-roues motorisés au Burkina Faso.
    Plateforme SaaS interfaçant importateurs, distributeurs, unités d'assemblage,
    détaillants et le ministère des transports (DRCTT).
    Supporte REST (mutations métier) et GraphQL (analytics).
  version: 1.0.0
  contact:
    name: iReg Moto BF Technical Team
    email: tech@ireg-moto.bf
  license:
    name: Proprietary
    url: https://ireg-moto.bf/licence

servers:
  - url: https://api.ireg-moto.bf/v1
    description: Production
  - url: https://api-staging.ireg-moto.bf/v1
    description: Staging

security:
  - BearerAuth: []
  - ApiKeyAuth: []

tags:
  - name: Auth
    description: Authentification et autorisation (JWT + OAuth2 + MFA)
  - name: Acteurs
    description: MODULE A — Gestion des acteurs économiques
  - name: Vehicules
    description: MODULE B — Gestion des véhicules et catégories
  - name: Stocks
    description: MODULE B — Gestion des stocks, inventaires et mouvements
  - name: Clients
    description: MODULE C — Gestion clientèle, KYC et traçabilité
  - name: Ventes
    description: MODULE D — Gestion commerciale, ventes et facturation
  - name: Pricing
    description: MODULE D — Pricing, marges et historique
  - name: Rapports
    description: MODULE E — Rapportage trimestriel automatique
  - name: Conformite
    description: MODULE F — Contrôle et conformité réglementaire
  - name: Securite
    description: MODULE G — Lutte contre l'insécurité et fraude
  - name: Admin
    description: MODULE H — Portail administratif et analytics
  - name: Ministere
    description: MODULE H — APIs portail ministère
  - name: Webhooks
    description: Gestion des webhooks

paths:
  # ==========================================================================
  # AUTH
  # ==========================================================================
  /auth/login:
    post:
      tags: [Auth]
      summary: Authentification par email/mot de passe
      description: >
        Authentifie un utilisateur et retourne un JWT access token.
        Si MFA est requis pour ce profil, retourne un token temporaire
        et nécessite une vérification MFA.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentification réussie (ou MFA requis)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Compte verrouillé ou suspendu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rafraîchissement du token d'accès
      description: >
        Échange un refresh token valide contre un nouveau couple
        access token + refresh token (rotation sécurisée).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  description: Refresh token JWT
                  example: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: Nouveaux tokens générés
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefreshResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/mfa/setup:
    post:
      tags: [Auth]
      summary: Configuration MFA (TOTP)
      description: >
        Génère un secret TOTP et un QR code pour l'enregistrement
        dans une application d'authentification (Google Authenticator, Authy).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mfaType]
              properties:
                mfaType:
                  type: string
                  enum: [TOTP, SMS]
                  example: TOTP
      responses:
        '200':
          description: Secret MFA généré
          content:
            application/json:
              schema:
                type: object
                properties:
                  secret:
                    type: string
                    example: JBSWY3DPEHPK3PXP
                  qrCodeUrl:
                    type: string
                    format: uri
                    example: otpauth://totp/iRegMoto:user@example.com?secret=JBSWY3DPEHPK3PXP&issuer=iRegMoto
                  backupCodes:
                    type: array
                    items:
                      type: string
                    example: ["12345678", "87654321", "11223344"]
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/mfa/verify:
    post:
      tags: [Auth]
      summary: Vérification MFA
      description: >
        Vérifie un code TOTP ou SMS et finalise l'authentification.
        Retourne les tokens JWT définitifs après validation MFA.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tempToken, mfaCode]
              properties:
                tempToken:
                  type: string
                  description: Token temporaire retourné par /auth/login
                mfaCode:
                  type: string
                  pattern: '^[0-9]{6}$'
                  description: Code TOTP à 6 chiffres
                  example: "123456"
                mfaType:
                  type: string
                  enum: [TOTP, SMS, BACKUP_CODE]
                  default: TOTP
      responses:
        '200':
          description: MFA validé, authentification complète
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Code MFA invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/oauth/callback:
    post:
      tags: [Auth]
      summary: Callback OAuth2 (Google, Microsoft)
      description: >
        Échange un code d'autorisation OAuth2 contre un compte iReg.
        Crée le compte s'il n'existe pas (first login).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, code]
              properties:
                provider:
                  type: string
                  enum: [GOOGLE, MICROSOFT]
                code:
                  type: string
                  description: Code d'autorisation OAuth2
                redirectUri:
                  type: string
                  format: uri
      responses:
        '200':
          description: Authentification OAuth réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Déconnexion
      description: >
        Révoque le token d'accès courant et ajoute le refresh token
        à la liste noire Redis.
      responses:
        '204':
          description: Déconnexion réussie
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      tags: [Auth]
      summary: Profil utilisateur connecté
      description: Retourne les informations du utilisateur authentifié.
      responses:
        '200':
          description: Profil utilisateur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==========================================================================
  # ACTEURS (MODULE A)
  # ==========================================================================
  /actors:
    get:
      tags: [Acteurs]
      summary: Liste des acteurs économiques
      description: >
        Retourne la liste paginée des acteurs économiques avec filtres.
        Un importateur ne voit que son propre acteur. Un admin voit tous.
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, ACTIVE, SUSPENDED, REVOKED, EXPIRED]
        - name: actorType
          in: query
          schema:
            type: string
            enum: [IMPORTATEUR, DISTRIBUTEUR, ASSEMBLEUR, DETAILLANT, PRESTATAIRE]
        - name: region
          in: query
          schema: { type: string }
        - name: search
          in: query
          schema: { type: string }
          description: Recherche par nom, NIF, RCCM
        - name: complianceScoreMin
          in: query
          schema: { type: number, minimum: 0, maximum: 100 }
        - name: agreementStatus
          in: query
          schema:
            type: string
            enum: [DRAFT, SUBMITTED, UNDER_REVIEW, APPROVED, REJECTED, EXPIRED]
      responses:
        '200':
          description: Liste des acteurs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedActors'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Acteurs]
      summary: Créer un acteur économique
      description: >
        Crée un nouvel acteur économique avec statut PENDING.
        Déclenche le workflow d'agrément.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateActorRequest'
      responses:
        '201':
          description: Acteur créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Actor'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: NIF ou email déjà existant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /actors/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }

    get:
      tags: [Acteurs]
      summary: Détail d'un acteur
      responses:
        '200':
          description: Détail acteur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActorDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Acteurs]
      summary: Modifier un acteur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateActorRequest'
      responses:
        '200':
          description: Acteur mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Actor'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /actors/{id}/documents:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }

    get:
      tags: [Acteurs]
      summary: Documents d'un acteur
      responses:
        '200':
          description: Liste des documents
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ActorDocument'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Acteurs]
      summary: Ajouter un document à un acteur
      description: Upload d'un document KYC (multipart/form-data).
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, documentType]
              properties:
                file:
                  type: string
                  format: binary
                documentType:
                  type: string
                  enum: [REGISTRE_COMMERCE, NIF, ASSURANCE, CERTIFICATE_ORIGIN, CONTRAT_DISTRIBUTION, CERT_AGREEMENT, LOCAL_CONTENT_PLAN]
                documentLabel:
                  type: string
                issuedDate:
                  type: string
                  format: date
                expiryDate:
                  type: string
                  format: date
      responses:
        '201':
          description: Document ajouté
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActorDocument'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          description: Fichier trop volumineux (max 10MB)

  /actors/{id}/warehouses:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }

    get:
      tags: [Acteurs]
      summary: Entrepôts d'un acteur
      responses:
        '200':
          description: Liste des entrepôts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Warehouse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Acteurs]
      summary: Créer un entrepôt pour un acteur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWarehouseRequest'
      responses:
        '201':
          description: Entrepôt créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Warehouse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /actors/{id}/agreement:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }

    post:
      tags: [Acteurs]
      summary: Soumettre une demande d'agrément
      responses:
        '202':
          description: Demande soumise pour révision
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ==========================================================================
  # VÉHICULES (MODULE B)
  # ==========================================================================
  /vehicles:
    get:
      tags: [Vehicules]
      summary: Liste des véhicules
      description: Recherche et liste des véhicules avec filtres avancés.
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
        - name: vin
          in: query
          schema: { type: string, pattern: '^[A-HJ-NPR-Z0-9]{17}$' }
          description: Recherche par VIN exact
        - name: status
          in: query
          schema:
            type: string
            enum: [IMPORTED, IN_STOCK, RESERVED, SOLD, REGISTERED, STOLEN, SCRAPPED, EXPORTED]
        - name: category
          in: query
          schema:
            type: string
            enum: [CYCLOMOTEUR_50CC, MOTO_LEGERE_125CC, MOTO_LOURDE_125CC_PLUS, TRICYCLE_MOTEUR, QUADRACYCLE, ELECTRIQUE_50CC_EQ, ELECTRIQUE_125CC_EQ, ELECTRIQUE_PLUS]
        - name: manufacturer
          in: query
          schema: { type: string }
        - name: model
          in: query
          schema: { type: string }
        - name: actorId
          in: query
          schema: { type: string, format: uuid }
          description: Filtrer par acteur propriétaire
        - name: warehouseId
          in: query
          schema: { type: string, format: uuid }
        - name: importDateFrom
          in: query
          schema: { type: string, format: date }
        - name: importDateTo
          in: query
          schema: { type: string, format: date }
        - name: isBlacklisted
          in: query
          schema: { type: boolean }
      responses:
        '200':
          description: Liste des véhicules
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedVehicles'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Vehicules]
      summary: Enregistrer un véhicule (import/assemblage)
      description: >
        Enregistre un nouveau véhicule dans le système.
        Vérifie automatiquement que la catégorie est autorisée
        et que l'homologation est valide.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVehicleRequest'
      responses:
        '201':
          description: Véhicule enregistré
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Véhicule non conforme (catégorie interdite)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /vehicles/{vin}:
    parameters:
      - name: vin
        in: path
        required: true
        schema:
          type: string
          pattern: '^[A-HJ-NPR-Z0-9]{17}$'

    get:
      tags: [Vehicules]
      summary: Détail d'un véhicule par VIN
      description: >
        Retourne les informations complètes d'un véhicule
        incluant son historique de propriété et son statut de conformité.
      responses:
        '200':
          description: Détail véhicule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Vehicules]
      summary: Modifier un véhicule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVehicleRequest'
      responses:
        '200':
          description: Véhicule mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /vehicles/{vin}/ownership-history:
    parameters:
      - name: vin
        in: path
        required: true
        schema:
          type: string
          pattern: '^[A-HJ-NPR-Z0-9]{17}$'
    get:
      tags: [Vehicules]
      summary: Historique de propriété d'un véhicule
      responses:
        '200':
          description: Historique de propriété
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/VehicleOwnership'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /vehicles/{vin}/qr-generate:
    parameters:
      - name: vin
        in: path
        required: true
        schema:
          type: string
          pattern: '^[A-HJ-NPR-Z0-9]{17}$'
    post:
      tags: [Vehicules]
      summary: Générer un QR code pour un véhicule
      description: >
        Génère un QR code unique contenant les informations
        essentielles du véhicule (VIN, catégorie, conformité).
      responses:
        '200':
          description: QR code généré
          content:
            application/json:
              schema:
                type: object
                properties:
                  qrCode:
                    type: string
                    description: Données encodées dans le QR
                  qrImageUrl:
                    type: string
                    format: uri
                    description: URL de l'image PNG du QR code
                  generatedAt:
                    type: string
                    format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /vehicles/blacklist:
    get:
      tags: [Vehicules]
      summary: Liste noire des véhicules
      description: Liste des véhicules signalés (vol, fraude, contrefaçon).
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: reason
          in: query
          schema:
            type: string
            enum: [STOLEN, FRAUD, COUNTERFEIT, NON_COMPLIANT, ADMIN_SEIZURE, INSURANCE_TOTAL_LOSS]
        - name: search
          in: query
          schema: { type: string }
          description: Recherche par VIN
        - name: isActive
          in: query
          schema: { type: boolean, default: true }
      responses:
        '200':
          description: Liste noire
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/VehicleBlacklistEntry'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Vehicules]
      summary: Ajouter un véhicule à la liste noire
      description: >
        Signale un véhicule comme volé, frauduleux ou contrefait.
        Nécessite le rôle CONTROLEUR, CNTI_AGENT ou ADMIN.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBlacklistEntryRequest'
      responses:
        '201':
          description: Véhicule ajouté à la liste noire
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleBlacklistEntry'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ==========================================================================
  # STOCKS (MODULE B)
  # ==========================================================================
  /stocks/movements:
    get:
      tags: [Stocks]
      summary: Mouvements de stock
      description: Historique des mouvements de stock avec filtres.
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: vehicleId
          in: query
          schema: { type: string, format: uuid }
        - name: actorId
          in: query
          schema: { type: string, format: uuid }
        - name: warehouseId
          in: query
          schema: { type: string, format: uuid }
        - name: movementType
          in: query
          schema:
            type: string
            enum: [IMPORT, ASSEMBLY, TRANSFER, SALE, RETURN, ADJUSTMENT, SCRAP, RESERVATION, RELEASE]
        - name: dateFrom
          in: query
          schema: { type: string, format: date }
        - name: dateTo
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: Liste des mouvements
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/StockMovement'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Stocks]
      summary: Enregistrer un mouvement de stock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStockMovementRequest'
      responses:
        '201':
          description: Mouvement enregistré
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockMovement'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: Stock insuffisant ou véhicule non disponible

  /stocks/inventory:
    get:
      tags: [Stocks]
      summary: Inventaires de stock
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: warehouseId
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
          schema:
            type: string
            enum: [PLANNED, IN_PROGRESS, COMPLETED, RECONCILED, DISCREPANCY_FOUND]
      responses:
        '200':
          description: Liste des inventaires
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/InventoryCount'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Stocks]
      summary: Créer un inventaire
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [warehouseId, plannedDate]
              properties:
                warehouseId:
                  type: string
                  format: uuid
                plannedDate:
                  type: string
                  format: date
                notes:
                  type: string
      responses:
        '201':
          description: Inventaire créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryCount'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /stocks/summary:
    get:
      tags: [Stocks]
      summary: Résumé des stocks par entrepôt
      description: >
        Retourne un résumé des stocks par catégorie et entrepôt.
        Utilisé pour le tableau de bord.
      parameters:
        - name: actorId
          in: query
          required: true
          schema: { type: string, format: uuid }
        - name: warehouseId
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Résumé des stocks
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        category:
                          type: string
                        categoryLabel:
                          type: string
                        totalUnits:
                          type: integer
                        totalValue:
                          type: number
                        warehouseId:
                          type: string
                        warehouseName:
                          type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==========================================================================
  # CLIENTS (MODULE C)
  # ==========================================================================
  /clients:
    get:
      tags: [Clients]
      summary: Liste des clients
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING_KYC, KYC_VERIFIED, KYC_REJECTED, BLACKLISTED]
        - name: search
          in: query
          schema: { type: string }
          description: Recherche par nom, téléphone, numéro document
        - name: actorId
          in: query
          schema: { type: string, format: uuid }
          description: Filtrer par acteur enregistreur
        - name: hasPendingKYC
          in: query
          schema: { type: boolean }
      responses:
        '200':
          description: Liste des clients
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Client'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Clients]
      summary: Créer un client (KYC)
      description: >
        Enregistre un nouveau client avec ses informations KYC.
        Déclenche la vérification automatique si tous les documents sont fournis.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClientRequest'
      responses:
        '201':
          description: Client créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Client avec même numéro de document déjà existant

  /clients/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }

    get:
      tags: [Clients]
      summary: Détail d'un client
      responses:
        '200':
          description: Détail client
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Clients]
      summary: Modifier un client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClientRequest'
      responses:
        '200':
          description: Client mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /clients/{id}/vehicles:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Clients]
      summary: Véhicules d'un client
      description: Liste des véhicules possédés par le client.
      responses:
        '200':
          description: Liste des véhicules
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/VehicleOwnership'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /clients/{id}/documents:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Clients]
      summary: Documents KYC d'un client
      responses:
        '200':
          description: Liste des documents
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ClientDocument'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Clients]
      summary: Ajouter un document KYC
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, documentType]
              properties:
                file:
                  type: string
                  format: binary
                documentType:
                  type: string
                  enum: [CNI_FRONT, CNI_BACK, PASSPORT, SELFIE, PROOF_ADDRESS]
      responses:
        '201':
          description: Document ajouté
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /clients/{id}/verify-kyc:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Clients]
      summary: Vérifier le KYC d'un client
      description: >
        Marque le KYC du client comme vérifié après contrôle
        des documents par un agent. Nécessite le rôle CONTROLEUR.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [KYC_VERIFIED, KYC_REJECTED]
                notes:
                  type: string
                riskLevel:
                  type: string
                  enum: [LOW, MEDIUM, HIGH]
      responses:
        '200':
          description: KYC mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==========================================================================
  # VENTES (MODULE D)
  # ==========================================================================
  /sales:
    get:
      tags: [Ventes]
      summary: Liste des ventes
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: status
          in: query
          schema:
            type: string
            enum: [DRAFT, PENDING_PAYMENT, PAID, PARTIALLY_PAID, CANCELLED, REFUNDED]
        - name: actorId
          in: query
          schema: { type: string, format: uuid }
        - name: clientId
          in: query
          schema: { type: string, format: uuid }
        - name: dateFrom
          in: query
          schema: { type: string, format: date }
        - name: dateTo
          in: query
          schema: { type: string, format: date }
        - name: paymentMethod
          in: query
          schema:
            type: string
            enum: [CASH, BANK_TRANSFER, MOBILE_MONEY, CHEQUE, CREDIT, INSTALLMENT]
        - name: minAmount
          in: query
          schema: { type: number }
        - name: maxAmount
          in: query
          schema: { type: number }
      responses:
        '200':
          description: Liste des ventes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSales'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Ventes]
      summary: Enregistrer une vente
      description: >
        Enregistre une vente de véhicule avec facturation OHADA.
        Vérifie automatiquement : blacklist, conformité, stock disponible.
        Déclenche la détection de fraude post-vente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSaleRequest'
      responses:
        '201':
          description: Vente enregistrée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaleDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: Vente bloquée (blacklist, non-conformité, stock indisponible)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sales/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }

    get:
      tags: [Ventes]
      summary: Détail d'une vente
      responses:
        '200':
          description: Détail vente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaleDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Ventes]
      summary: Modifier une vente (avant finalisation)
      description: Modification possible uniquement si statut DRAFT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSaleRequest'
      responses:
        '200':
          description: Vente mise à jour
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Vente non modifiable (statut avancé)

  /sales/{id}/cancel:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Ventes]
      summary: Annuler une vente
      description: >
        Annule une vente et restaure le stock.
        Nécessite une justification.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  minLength: 10
      responses:
        '200':
          description: Vente annulée
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Vente déjà annulée ou trop ancienne (> 30 jours)

  /sales/{id}/invoice:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Ventes]
      summary: Télécharger la facture OHADA
      description: >
        Retourne la facture PDF signée électroniquement
        conforme aux normes OHADA.
      responses:
        '200':
          description: Facture PDF
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==========================================================================
  # PRICING (MODULE D)
  # ==========================================================================
  /pricing/history:
    get:
      tags: [Pricing]
      summary: Historique des prix
      description: >
        Retourne l'historique des prix d'achat et de vente
        avec calcul automatique des marges.
      parameters:
        - name: actorId
          in: query
          required: true
          schema: { type: string, format: uuid }
        - name: vehicleCategoryId
          in: query
          schema: { type: string, format: uuid }
        - name: manufacturer
          in: query
          schema: { type: string }
        - name: dateFrom
          in: query
          schema: { type: string, format: date }
        - name: dateTo
          in: query
          schema: { type: string, format: date }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Historique des prix
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PricingHistoryEntry'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Pricing]
      summary: Enregistrer un prix d'achat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePurchasePriceRequest'
      responses:
        '201':
          description: Prix enregistré
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchasePrice'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /pricing/margins:
    get:
      tags: [Pricing]
      summary: Analyse des marges
      description: >
        Retourne l'analyse des marges par catégorie,
        fabricant et période. Détecte les anomalies.
      parameters:
        - name: actorId
          in: query
          required: true
          schema: { type: string, format: uuid }
        - name: groupBy
          in: query
          schema:
            type: string
            enum: [CATEGORY, MANUFACTURER, MODEL, MONTH]
          default: CATEGORY
        - name: dateFrom
          in: query
          schema: { type: string, format: date }
        - name: dateTo
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: Analyse des marges
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        groupKey:
                          type: string
                        groupLabel:
                          type: string
                        avgPurchasePrice:
                          type: number
                        avgSellingPrice:
                          type: number
                        avgMarginRate:
                          type: number
                        totalSales:
                          type: integer
                        totalRevenue:
                          type: number
                        anomalyCount:
                          type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

  /pricing/anomalies:
    get:
      tags: [Pricing]
      summary: Détecter les anomalies de prix
      description: >
        Liste les ventes avec des marges anormales
        (trop faibles ou trop élevées par rapport au marché).
      parameters:
        - name: actorId
          in: query
          schema: { type: string, format: uuid }
        - name: severity
          in: query
          schema:
            type: string
            enum: [LOW, MEDIUM, HIGH, CRITICAL]
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Anomalies détectées
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        saleId:
                          type: string
                        vehicleVin:
                          type: string
                        anomalyType:
                          type: string
                        expectedMargin:
                          type: number
                        actualMargin:
                          type: number
                        severity:
                          type: string
                        detectedAt:
                          type: string
                          format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==========================================================================
  # RAPPORTS (MODULE E)
  # ==========================================================================
  /reports/quarterly/generate:
    post:
      tags: [Rapports]
      summary: Générer un rapport trimestriel
      description: >
        Lance la génération asynchrone d'un rapport trimestriel.
        Le rapport inclut : ventes, achats, stocks, conformité, taxes.
        Retourne immédiatement avec statut PROCESSING.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [year, quarter]
              properties:
                year:
                  type: integer
                  minimum: 2025
                  maximum: 2100
                  example: 2026
                quarter:
                  type: string
                  enum: [Q1, Q2, Q3, Q4]
                  example: Q2
      responses:
        '202':
          description: Génération lancée
          content:
            application/json:
              schema:
                type: object
                properties:
                  reportId:
                    type: string
                    format: uuid
                  status:
                    type: string
                    example: GENERATING
                  estimatedCompletion:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Rapport déjà généré ou en cours

  /reports/quarterly/status/{reportId}:
    parameters:
      - name: reportId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Rapports]
      summary: Statut d'un rapport
      responses:
        '200':
          description: Statut du rapport
          content:
            application/json:
              schema:
                type: object
                properties:
                  reportId:
                    type: string
                  status:
                    type: string
                    enum: [DRAFT, GENERATING, READY, SUBMITTED, UNDER_REVIEW, APPROVED, REJECTED, AMENDMENT_REQUIRED]
                  progress:
                    type: integer
                    description: Pourcentage de génération (0-100)
                  downloadUrls:
                    type: object
                    properties:
                      xml:
                        type: string
                        format: uri
                      pdf:
                        type: string
                        format: uri
                  generatedAt:
                    type: string
                    format: date-time
                  submittedAt:
                    type: string
                    format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /reports/quarterly/submit:
    post:
      tags: [Rapports]
      summary: Soumettre un rapport au ministère
      description: >
        Soumet le rapport trimestriel généré au portail
        du ministère pour révision. Déclenche les notifications.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reportId]
              properties:
                reportId:
                  type: string
                  format: uuid
                notes:
                  type: string
                  description: Notes accompagnant la soumission
      responses:
        '200':
          description: Rapport soumis
          content:
            application/json:
              schema:
                type: object
                properties:
                  reportId:
                    type: string
                  status:
                    type: string
                    example: SUBMITTED
                  acknowledgmentNumber:
                    type: string
                    example: RPT-2026-Q2-0001234
                  submittedAt:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Rapport non prêt ou déjà soumis

  /reports/quarterly/deadlines:
    get:
      tags: [Rapports]
      summary: Échéances de rapportage
      description: >
        Retourne les échéances de rapportage pour l'acteur connecté
        avec les jours restants et les alertes.
      responses:
        '200':
          description: Échéances
          content:
            application/json:
              schema:
                type: object
                properties:
                  currentQuarter:
                    type: string
                    example: Q2-2026
                  deadline:
                    type: string
                    format: date
                    example: '2026-07-15'
                  daysRemaining:
                    type: integer
                    example: 30
                  status:
                    type: string
                    enum: [NOT_STARTED, IN_PROGRESS, READY, SUBMITTED, OVERDUE]
                  alertLevel:
                    type: string
                    enum: [NONE, INFO, WARNING, CRITICAL]
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==========================================================================
  # CONFORMITÉ (MODULE F)
  # ==========================================================================
  /compliance/rules:
    get:
      tags: [Conformite]
      summary: Liste des règles de conformité
      description: >
        Retourne toutes les règles de conformité actives.
        Les admins peuvent voir toutes les règles.
      parameters:
        - name: ruleType
          in: query
          schema:
            type: string
            enum: [DOCUMENT, VEHICLE_SPEC, PRICING, STOCK, KYC, TIMING, CUSTOMS, TAX]
        - name: severity
          in: query
          schema:
            type: string
            enum: [INFO, WARNING, CRITICAL, BLOCKER]
        - name: isActive
          in: query
          schema: { type: boolean, default: true }
      responses:
        '200':
          description: Liste des règles
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ComplianceRule'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /compliance/checklist:
    get:
      tags: [Conformite]
      summary: Checklist de conformité d'un acteur
      parameters:
        - name: actorId
          in: query
          required: true
          schema: { type: string, format: uuid }
        - name: checklistId
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Checklist
          content:
            application/json:
              schema:
                type: object
                properties:
                  checklist:
                    $ref: '#/components/schemas/ComplianceChecklist'
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ComplianceChecklistItem'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Conformite]
      summary: Lancer une évaluation de conformité
      description: >
        Lance l'évaluation automatique de toutes les règles
        applicables à un acteur. Crée une checklist.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actorId]
              properties:
                actorId:
                  type: string
                  format: uuid
                checklistType:
                  type: string
                  enum: [SELF_ASSESSMENT, INSPECTION, AUDIT]
                  default: SELF_ASSESSMENT
      responses:
        '201':
          description: Évaluation lancée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceChecklist'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /compliance/checklist/{checklistId}/items/{itemId}:
    parameters:
      - name: checklistId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: itemId
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [Conformite]
      summary: Évaluer un item de checklist
      description: >
        Met à jour le statut d'un item de checklist
        (PASS, FAIL, NA) avec notes et preuve.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [PASS, FAIL, NA]
                observedValue:
                  type: string
                notes:
                  type: string
                evidenceDocumentId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Item mis à jour
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /compliance/score:
    get:
      tags: [Conformite]
      summary: Score de conformité
      description: >
        Retourne le score de conformité calculé pour un acteur
        avec le détail par dimension.
      parameters:
        - name: actorId
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Score de conformité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceScore'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /compliance/countdown:
    get:
      tags: [Conformite]
      summary: Compte à rebours avant sanction
      description: >
        Retourne le nombre de jours restants avant
        une éventuelle sanction administrative.
      parameters:
        - name: actorId
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Compte à rebours
          content:
            application/json:
              schema:
                type: object
                properties:
                  actorId:
                    type: string
                  countdownDays:
                    type: integer
                    description: Jours restants (0 = sanction imminente, -1 = pas de risque)
                  alertLevel:
                    type: string
                    enum: [NONE, INFO, WARNING, CRITICAL]
                  nextDeadline:
                    type: string
                    format: date
                  complianceScore:
                    type: number
                  criticalFailures:
                    type: integer
                  recommendations:
                    type: array
                    items:
                      type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==========================================================================
  # SÉCURITÉ (MODULE G)
  # ==========================================================================
  /security/alerts:
    get:
