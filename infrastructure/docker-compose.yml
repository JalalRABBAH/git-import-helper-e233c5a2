# ============================================================================
# iReg Moto BF — Docker Compose Développement Local
# Plateforme réglementaire de conformité deux-roues — Burkina Faso
# ============================================================================
# Usage : docker compose up -d
# Ports exposés :
#   - 80      : Nginx reverse proxy (application)
#   - 3000    : API NestJS (direct)
#   - 3001    : React dev server (direct)
#   - 5432    : PostgreSQL
#   - 6379    : Redis
#   - 9000    : MinIO API S3
#   : 9001    : MinIO Console
#   : 5672    : RabbitMQ AMQP
#   : 15672   : RabbitMQ Management UI
#   : 9090    : Prometheus
#   : 9093    : Alertmanager
#   : 3100    : Loki
#   : 3003    : Grafana
# ============================================================================

version: "3.9"

x-common-variables: &common-variables
  NODE_ENV: development
  TZ: Africa/Ouagadougou
  LOG_LEVEL: debug

x-backend-env: &backend-env
  <<: *common-variables
  # Base de données
  DATABASE_URL: postgresql://ireg_user:ireg_dev_password@postgres:5432/ireg_moto_bf?schema=public
  DB_HOST: postgres
  DB_PORT: 5432
  DB_NAME: ireg_moto_bf
  DB_USER: ireg_user
  DB_PASSWORD: ireg_dev_password
  # Redis
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ireg_redis_dev
  # MinIO (S3)
  S3_ENDPOINT: minio:9000
  S3_ACCESS_KEY: minioadmin
  S3_SECRET_KEY: minioadmin123
  S3_BUCKET: ireg-documents
  S3_REGION: us-east-1
  S3_USE_SSL: "false"
  # RabbitMQ
  RABBITMQ_URL: amqp://ireg_mq_user:ireg_mq_dev@rabbitmq:5672
  RABBITMQ_QUEUE: rapports-conformite
  RABBITMQ_EXCHANGE: ireg.events
  # Sécurité
  JWT_SECRET: dev-jwt-secret-change-in-production-ireg-moto-bf-2024
  JWT_EXPIRATION: 24h
  REFRESH_TOKEN_EXPIRY: 7d
  BCRYPT_ROUNDS: "10"
  # API
  API_PORT: "3000"
  API_PREFIX: /api/v1
  CORS_ORIGIN: "http://localhost,http://localhost:80,http://localhost:3001"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX: "100"
  # Feature flags
  ENABLE_SWAGGER: "true"
  ENABLE_METRICS: "true"

services:
  # ==========================================================================
  # PostgreSQL 15 — Base de données principale
  # ==========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: ireg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ireg_moto_bf
      POSTGRES_USER: ireg_user
      POSTGRES_PASSWORD: ireg_dev_password
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: Africa/Ouagadougou
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - ireg-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ireg_user -d ireg_moto_bf"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  # ==========================================================================
  # Redis — Cache + Sessions + Rate Limiting
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: ireg-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ireg_redis_dev
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    environment:
      TZ: Africa/Ouagadougou
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - ireg-backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ireg_redis_dev", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ==========================================================================
  # MinIO — Stockage S3-compatible (documents, rapports, photos)
  # ==========================================================================
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: ireg-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
      TZ: Africa/Ouagadougou
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - ireg-backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # Création automatique du bucket
  minio-init:
    image: minio/mc:RELEASE.2024-06-13T18-11-37Z
    container_name: ireg-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123 &&
      mc mb local/ireg-documents --ignore-existing &&
      mc anonymous set download local/ireg-documents/public &&
      mc anonymous set private local/ireg-documents/private &&
      echo 'Buckets MinIO initialises'
      "
    networks:
      - ireg-backend
    restart: "no"

  # ==========================================================================
  # RabbitMQ — Message Queue + Management UI
  # ==========================================================================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ireg-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ireg_mq_user
      RABBITMQ_DEFAULT_PASS: ireg_mq_dev
      RABBITMQ_DEFAULT_VHOST: /
      TZ: Africa/Ouagadougou
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - ireg-backend
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ==========================================================================
  # Backend — NestJS API
  # ==========================================================================
  app:
    build:
      context: ../backend
      dockerfile: ../infrastructure/Dockerfile.backend
      target: production
    container_name: ireg-backend
    restart: unless-stopped
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - ireg-backend
      - ireg-monitoring
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

  # ==========================================================================
  # Frontend — React Application (dev server)
  # ==========================================================================
  web:
    build:
      context: ../frontend
      dockerfile: ../infrastructure/Dockerfile.frontend
      target: deps
    container_name: ireg-frontend
    restart: unless-stopped
    working_dir: /app
    command: npm start
    environment:
      <<: *common-variables
      REACT_APP_API_URL: http://localhost/api/v1
      REACT_APP_ENV: development
      REACT_APP_S3_ENDPOINT: http://localhost:9000
      REACT_APP_RABBITMQ_WS_URL: ws://localhost:15674/ws
      PORT: "3001"
      BROWSER: "none"
      WDS_SOCKET_PORT: "0"
    volumes:
      - ../frontend/src:/app/src:ro
      - ../frontend/public:/app/public:ro
    ports:
      - "3001:3001"
    networks:
      - ireg-frontend
      - ireg-backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ==========================================================================
  # Nginx — Reverse Proxy + Load Balancer
  # ==========================================================================
  nginx:
    image: nginx:1.27-alpine
    container_name: ireg-nginx
    restart: unless-stopped
    depends_on:
      - app
      - web
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/includes:/etc/nginx/includes:ro
      - nginx_logs:/var/log/nginx
    ports:
      - "80:80"
    networks:
      - ireg-frontend
      - ireg-backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  # ==========================================================================
  # Prometheus — Collecte de métriques
  # ==========================================================================
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: ireg-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - ireg-monitoring
      - ireg-backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ==========================================================================
  # Grafana — Dashboards de monitoring
  # ==========================================================================
  grafana:
    image: grafana/grafana:10.4.4
    container_name: ireg-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3003
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
      TZ: Africa/Ouagadougou
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    ports:
      - "3003:3000"
    networks:
      - ireg-monitoring
      - ireg-backend
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  # ==========================================================================
  # Loki — Agrégation de logs
  # ==========================================================================
  loki:
    image: grafana/loki:2.9.8
    container_name: ireg-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    networks:
      - ireg-monitoring
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  # ==========================================================================
  # Promtail — Collecte de logs (optionnel pour dev)
  # ==========================================================================
  promtail:
    image: grafana/promtail:2.9.8
    container_name: ireg-promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - ireg-monitoring
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

# ============================================================================
# Réseaux
# ============================================================================
networks:
  ireg-backend:
    driver: bridge
    name: ireg-backend
    ipam:
      config:
        - subnet: 172.20.0.0/24
  ireg-frontend:
    driver: bridge
    name: ireg-frontend
    ipam:
      config:
        - subnet: 172.20.1.0/24
  ireg-monitoring:
    driver: bridge
    name: ireg-monitoring
    ipam:
      config:
        - subnet: 172.20.2.0/24

# ============================================================================
# Volumes persistants
# ============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  rabbitmq_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  nginx_logs:
    driver: local
