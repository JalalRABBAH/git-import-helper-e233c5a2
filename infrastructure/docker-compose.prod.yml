# ============================================================================
# iReg Moto BF — Docker Compose Production (simplifié)
# Version optimisée pour le déploiement production
# Cloud-agnostic : AWS, Azure, On-premise, Cloud souverain africain
# ============================================================================
# Usage : docker compose -f docker-compose.prod.yml up -d
#
# Principes :
#   - Images pré-buildées (registry interne)
#   - Pas de ports exposés directement (sauf reverse proxy)
#   - Healthchecks sur tous les services
#   - Resource limits stricts
#   - Restart policy : unless-stopped
#   - Logging structuré (JSON)
# ============================================================================

version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"
    labels: "service_name"
    env: "OS_VERSION,service_version"

x-backend-env: &backend-env
  NODE_ENV: production
  TZ: Africa/Ouagadougou
  LOG_LEVEL: info
  LOG_FORMAT: json
  # Base de données (injectées via secrets en production réelle)
  DATABASE_URL: ${DATABASE_URL}
  DB_HOST: ${DB_HOST:-postgres}
  DB_PORT: ${DB_PORT:-5432}
  DB_NAME: ${DB_NAME:-ireg_moto_bf}
  DB_USER: ${DB_USER}
  DB_PASSWORD: ${DB_PASSWORD}
  # Pool de connexions
  DB_POOL_MIN: "5"
  DB_POOL_MAX: "20"
  DB_IDLE_TIMEOUT: 30000
  DB_CONNECTION_TIMEOUT: 5000
  # Redis
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  REDIS_TLS_ENABLED: ${REDIS_TLS_ENABLED:-false}
  # MinIO / S3
  S3_ENDPOINT: ${S3_ENDPOINT}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY}
  S3_SECRET_KEY: ${S3_SECRET_KEY}
  S3_BUCKET: ${S3_BUCKET:-ireg-documents}
  S3_REGION: ${S3_REGION:-af-west-1}
  S3_USE_SSL: ${S3_USE_SSL:-true}
  # RabbitMQ
  RABBITMQ_URL: ${RABBITMQ_URL}
  RABBITMQ_QUEUE: ${RABBITMQ_QUEUE:-rapports-conformite}
  RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-ireg.events}
  RABBITMQ_HEARTBEAT: "60"
  # Sécurité
  JWT_SECRET: ${JWT_SECRET}
  JWT_EXPIRATION: ${JWT_EXPIRATION:-1h}
  REFRESH_TOKEN_EXPIRY: ${REFRESH_TOKEN_EXPIRY:-7d}
  BCRYPT_ROUNDS: "12"
  # API
  API_PORT: "3000"
  API_PREFIX: /api/v1
  CORS_ORIGIN: ${CORS_ORIGIN}
  TRUST_PROXY: "true"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX: "100"
  # Features
  ENABLE_SWAGGER: "false"
  ENABLE_METRICS: "true"
  METRICS_PORT: "9090"
  # Offline mode
  OFFLINE_MODE_ENABLED: ${OFFLINE_MODE_ENABLED:-true}
  SYNC_INTERVAL_MINUTES: ${SYNC_INTERVAL_MINUTES:-30}

services:
  # ==========================================================================
  # PostgreSQL 15 — Base de données (production)
  # ==========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: ireg-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ireg_moto_bf}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: Africa/Ouagadougou
      # Tuning PostgreSQL pour production
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
      - ./backups:/backups:rw
    # Pas de port exposé en production (accès interne uniquement)
    networks:
      - ireg-prod-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    security_opt:
      - no-new-privileges:true
    read_only: false

  # ==========================================================================
  # Redis — Cache + Sessions (production)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: ireg-redis-prod
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --tcp-keepalive 300
      --timeout 0
    volumes:
      - redis_prod_data:/data
    networks:
      - ireg-prod-backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    security_opt:
      - no-new-privileges:true

  # ==========================================================================
  # MinIO — Stockage S3-compatible (production)
  # ==========================================================================
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: ireg-minio-prod
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
      MINIO_BROWSER: "off"
      TZ: Africa/Ouagadougou
    volumes:
      - minio_prod_data:/data
    networks:
      - ireg-prod-backend
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    security_opt:
      - no-new-privileges:true

  # ==========================================================================
  # RabbitMQ — Message Queue (production)
  # ==========================================================================
  rabbitmq:
    image: rabbitmq:3.13-alpine
    container_name: ireg-rabbitmq-prod
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: /
      TZ: Africa/Ouagadougou
    volumes:
      - rabbitmq_prod_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    networks:
      - ireg-prod-backend
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    security_opt:
      - no-new-privileges:true

  # ==========================================================================
  # Backend — NestJS API (production)
  # ==========================================================================
  app:
    image: ${REGISTRY_URL:-localhost}/ireg-moto-bf/backend:${BACKEND_VERSION:-latest}
    container_name: ireg-backend-prod
    restart: unless-stopped
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ireg-prod-backend
      - ireg-prod-monitoring
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging: *default-logging
    deploy:
      replicas: ${BACKEND_REPLICAS:-2}
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    security_opt:
      - no-new-privileges:true
    # Configuration pour le mode offline
    tmpfs:
      - /tmp:size=100M,noexec,nosuid,nodev

  # ==========================================================================
  # Frontend — React (production via Nginx)
  # ==========================================================================
  web:
    image: ${REGISTRY_URL:-localhost}/ireg-moto-bf/frontend:${FRONTEND_VERSION:-latest}
    container_name: ireg-frontend-prod
    restart: unless-stopped
    environment:
      TZ: Africa/Ouagadougou
    depends_on:
      - app
    networks:
      - ireg-prod-frontend
      - ireg-prod-backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    deploy:
      replicas: ${FRONTEND_REPLICAS:-2}
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    security_opt:
      - no-new-privileges:true

  # ==========================================================================
  # Nginx — Reverse Proxy (point d'entrée unique)
  # ==========================================================================
  nginx:
    image: nginx:1.27-alpine
    container_name: ireg-nginx-prod
    restart: unless-stopped
    depends_on:
      - app
      - web
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/includes:/etc/nginx/includes:ro
      - nginx_prod_logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - ireg-prod-frontend
      - ireg-prod-backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "https://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    security_opt:
      - no-new-privileges:true

  # ==========================================================================
  # Prometheus — Métriques (production)
  # ==========================================================================
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: ireg-prometheus-prod
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=10GB"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_prod_data:/prometheus
    networks:
      - ireg-prod-monitoring
      - ireg-prod-backend
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G
    security_opt:
      - no-new-privileges:true

  # ==========================================================================
  # Grafana — Dashboards (production)
  # ==========================================================================
  grafana:
    image: grafana/grafana:10.4.4
    container_name: ireg-grafana-prod
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL}
      GF_SMTP_ENABLED: ${GF_SMTP_ENABLED:-false}
      TZ: Africa/Ouagadougou
    volumes:
      - grafana_prod_data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana-datasources.prod.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    networks:
      - ireg-prod-monitoring
    depends_on:
      - prometheus
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    security_opt:
      - no-new-privileges:true

  # ==========================================================================
  # Node Exporter — Métriques système (optionnel pour Docker)
  # ==========================================================================
  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: ireg-node-exporter-prod
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro,rslave
    networks:
      - ireg-prod-monitoring
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

  # ==========================================================================
  # Cadvisor — Métriques conteneurs
  # ==========================================================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: ireg-cadvisor-prod
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - ireg-prod-monitoring
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

# ============================================================================
# Réseaux isolés (ségrégation)
# ============================================================================
networks:
  ireg-prod-backend:
    driver: bridge
    internal: false
    driver_opts:
      com.docker.network.bridge.name: ireg-prod-backend
  ireg-prod-frontend:
    driver: bridge
    internal: false
    driver_opts:
      com.docker.network.bridge.name: ireg-prod-frontend
  ireg-prod-monitoring:
    driver: bridge
    internal: true
    driver_opts:
      com.docker.network.bridge.name: ireg-prod-monitoring

# ============================================================================
# Volumes persistants (nommés pour traçabilité)
# ============================================================================
volumes:
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local
  minio_prod_data:
    driver: local
  rabbitmq_prod_data:
    driver: local
  prometheus_prod_data:
    driver: local
  grafana_prod_data:
    driver: local
  nginx_prod_logs:
    driver: local
