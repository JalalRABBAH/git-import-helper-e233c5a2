# ============================================================================
# iReg Moto BF — Secret Template (Variables sensibles)
# ============================================================================
# ⚠️  IMPORTANT : Ce fichier est un TEMPLATE.
#     Ne JAMAIS committer les vraies valeurs.
#     Utiliser :
#       - Sealed Secrets (Bitnami)
#       - External Secrets Operator (ESO)
#       - Vault (HashiCorp)
#       - ou kubectl create secret generic
#
# Création manuelle d'un secret :
#   kubectl create secret generic ireg-backend-secrets \
#     --namespace=ireg-moto-bf-prod \
#     --from-literal=database-url='postgresql://...' \
#     --from-literal=jwt-secret='...' \
#     --dry-run=client -o yaml | kubeseal > sealed-secret.yaml
# ============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: ireg-backend-secrets
  namespace: ireg-moto-bf-prod
  labels:
    app.kubernetes.io/name: ireg-backend
    app.kubernetes.io/component: secrets
  annotations:
    # Marquer comme template - ne pas appliquer directement
    sealedsecrets.bitnami.com/managed: "true"
    vault.hashicorp.com/agent-inject: "true"
type: Opaque
stringData:
  # === Base de données ===
  # Format : postgresql://user:password@host:port/dbname?schema=public
  database-url: "<REPLACE_WITH_SEALED_DATABASE_URL>"
  db-password: "<REPLACE_WITH_SEALED_DB_PASSWORD>"

  # === Redis ===
  redis-password: "<REPLACE_WITH_SEALED_REDIS_PASSWORD>"

  # === MinIO / S3 ===
  s3-access-key: "<REPLACE_WITH_SEALED_S3_ACCESS_KEY>"
  s3-secret-key: "<REPLACE_WITH_SEALED_S3_SECRET_KEY>"

  # === RabbitMQ ===
  rabbitmq-user: "<REPLACE_WITH_SEALED_RABBITMQ_USER>"
  rabbitmq-password: "<REPLACE_WITH_SEALED_RABBITMQ_PASSWORD>"

  # === Sécurité ===
  jwt-secret: "<REPLACE_WITH_SEALED_JWT_SECRET>"
  jwt-refresh-secret: "<REPLACE_WITH_SEALED_JWT_REFRESH_SECRET>"
  encryption-key: "<REPLACE_WITH_SEALED_AES_256_KEY>"

  # === API Keys (intégrations tierces) ===
  # API SMS (Orange BF, etc.)
  sms-api-key: "<REPLACE_WITH_SEALED_SMS_API_KEY>"
  sms-api-secret: "<REPLACE_WITH_SEALED_SMS_API_SECRET>"

  # API Paiement (Orange Money, Moov Money)
  payment-api-key: "<REPLACE_WITH_SEALED_PAYMENT_API_KEY>"
  payment-api-secret: "<REPLACE_WITH_SEALED_PAYMENT_API_SECRET>"

  # API Gouvernement (vérification immatriculations)
  gov-api-key: "<REPLACE_WITH_SEALED_GOV_API_KEY>"

  # === Monitoring / Alerting ===
  grafana-admin-password: "<REPLACE_WITH_SEALED_GRAFANA_PASSWORD>"
  alertmanager-slack-webhook: "<REPLACE_WITH_SEALED_SLACK_WEBHOOK>"
  alertmanager-email-password: "<REPLACE_WITH_SEALED_EMAIL_PASSWORD>"

  # === Backup / Restore ===
  backup-encryption-key: "<REPLACE_WITH_SEALED_BACKUP_KEY>"
  backup-s3-access-key: "<REPLACE_WITH_SEALED_BACKUP_S3_KEY>"
  backup-s3-secret-key: "<REPLACE_WITH_SEALED_BACKUP_S3_SECRET>"
---
# Secret pour le frontend (généralement minimal)
apiVersion: v1
kind: Secret
metadata:
  name: ireg-frontend-secrets
  namespace: ireg-moto-bf-prod
  labels:
    app.kubernetes.io/name: ireg-frontend
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Sentry / Error tracking
  sentry-dsn: "<REPLACE_WITH_SEALED_SENTRY_DSN>"

  # Google Analytics / Matomo (analytics)
  analytics-key: "<REPLACE_WITH_SEALED_ANALYTICS_KEY>"
---
# Secret TLS (géré par cert-manager - ne pas modifier manuellement)
apiVersion: v1
kind: Secret
metadata:
  name: ireg-tls-secret
  namespace: ireg-moto-bf-prod
  labels:
    app.kubernetes.io/name: ireg-tls
    app.kubernetes.io/component: tls
  annotations:
    cert-manager.io/certificate-name: "ireg-moto-bf-cert"
type: kubernetes.io/tls
data:
  tls.crt: "<BASE64_ENCODED_CERT>"
  tls.key: "<BASE64_ENCODED_KEY>"
---
# Docker Registry Secret (pour puller les images privées)
apiVersion: v1
kind: Secret
metadata:
  name: ireg-registry-secret
  namespace: ireg-moto-bf-prod
  labels:
    app.kubernetes.io/name: registry
    app.kubernetes.io/component: pull-secret
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: "<BASE64_ENCODED_DOCKER_CONFIG>"
