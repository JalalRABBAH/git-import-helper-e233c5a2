# ============================================================================
# MinIO — Deployment (Stockage S3-compatible)
# ============================================================================
# Stockage des documents, rapports de conformité, photos
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: ireg-moto-bf-prod
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: ireg-moto-bf
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/component: storage
        app.kubernetes.io/part-of: ireg-moto-bf
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9000"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-06-13T22-53-53Z
          args:
            - "server"
            - "/data"
            - "--console-address"
            - ":9001"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: ireg-backend-secrets
                  key: s3-access-key
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ireg-backend-secrets
                  key: s3-secret-key
            - name: MINIO_BROWSER
              value: "off"  # Désactiver UI console en production
            - name: MINIO_PROMETHEUS_AUTH_TYPE
              value: "public"
            - name: TZ
              value: "Africa/Ouagadougou"
          ports:
            - name: s3-api
              containerPort: 9000
              protocol: TCP
            - name: console
              containerPort: 9001
              protocol: TCP
          volumeMounts:
            - name: minio-data
              mountPath: /data
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: s3-api
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: s3-api
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /minio/health/live
              port: s3-api
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: minio-data
