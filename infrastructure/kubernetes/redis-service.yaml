# ============================================================================
# Redis — Service
# ============================================================================

apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: ireg-moto-bf-prod
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: ireg-moto-bf
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter-service
  namespace: ireg-moto-bf-prod
  labels:
    app.kubernetes.io/name: redis-exporter
    app.kubernetes.io/component: monitoring
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis-exporter
  ports:
    - name: metrics
      port: 9121
      targetPort: 9121
