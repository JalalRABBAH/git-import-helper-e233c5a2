# ============================================================================
# RabbitMQ — Deployment (Message Queue)
# ============================================================================
# File d'attente pour les rapports de conformité
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: ireg-moto-bf-prod
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/component: messaging
    app.kubernetes.io/part-of: ireg-moto-bf
    app.kubernetes.io/version: "3.13"
spec:
  replicas: 1  # Pour HA : utiliser RabbitMQ Cluster Operator
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: rabbitmq
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rabbitmq
        app.kubernetes.io/component: messaging
        app.kubernetes.io/part-of: ireg-moto-bf
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "15692"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: amqp
              containerPort: 5672
              protocol: TCP
            - name: management
              containerPort: 15672
              protocol: TCP
            - name: prometheus
              containerPort: 15692
              protocol: TCP

          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: ireg-backend-secrets
                  key: rabbitmq-user
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: ireg-backend-secrets
                  key: rabbitmq-password
            - name: RABBITMQ_DEFAULT_VHOST
              value: "/"
            - name: RABBITMQ_ERLANG_COOKIE
              valueFrom:
                secretKeyRef:
                  name: ireg-backend-secrets
                  key: rabbitmq-erlang-cookie
                  optional: true
            - name: RABBITMQ_MANAGEMENT_ENABLED
              value: "true"
            - name: RABBITMQ_PROMETHEUS_ENABLED
              value: "true"
            - name: TZ
              value: "Africa/Ouagadougou"

          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
            - name: rabbitmq-config
              mountPath: /etc/rabbitmq/rabbitmq.conf
              subPath: rabbitmq.conf
              readOnly: true

          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          livenessProbe:
            exec:
              command:
                - "rabbitmq-diagnostics"
                - "status"
            initialDelaySeconds: 60
            periodSeconds: 60
            timeoutSeconds: 15
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - "rabbitmq-diagnostics"
                - "ping"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          startupProbe:
            exec:
              command:
                - "rabbitmq-diagnostics"
                - "ping"
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

      volumes:
        - name: rabbitmq-data
          emptyDir:
            sizeLimit: 10Gi  # Utiliser PVC pour persistence
        - name: rabbitmq-config
          configMap:
            name: rabbitmq-config
            optional: true

      # Init container pour créer les queues/exchanges
      initContainers:
        - name: init-rabbitmq
          image: busybox:1.36
          command: ['sh', '-c', 'echo "RabbitMQ init done"']
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop:
                - ALL
