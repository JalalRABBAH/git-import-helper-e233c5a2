# ============================================================================
# PostgreSQL 15 — Deployment
# ============================================================================
# Base de données critique : haute disponibilité via StatefulSet
# En production : utiliser un operator PostgreSQL (CloudNativePG, Zalando)
# ============================================================================

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: ireg-moto-bf-prod
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: ireg-moto-bf
    app.kubernetes.io/version: "15"
    app.kubernetes.io/managed-by: kubernetes
spec:
  serviceName: postgres-service
  replicas: 1  # À augmenter avec replication/streaming pour HA
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: ireg-moto-bf
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
        prometheus.io/path: "/metrics"
    spec:
      # Sécurité : non-root
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: postgres
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP

          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: PG_DATABASE_NAME
                  optional: true
            - name: POSTGRES_DB
              value: "ireg_moto_bf"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ireg-backend-secrets
                  key: db-user
                  optional: true
            - name: POSTGRES_USER
              value: "ireg_user"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ireg-backend-secrets
                  key: db-password
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
            - name: TZ
              value: "Africa/Ouagadougou"
            - name: POSTGRES_INITDB_ARGS
              value: "--encoding=UTF8 --locale=fr_FR.UTF-8"

            # Tuning PostgreSQL
            - name: POSTGRES_SHARED_BUFFERS
              value: "256MB"
            - name: POSTGRES_EFFECTIVE_CACHE_SIZE
              value: "768MB"
            - name: POSTGRES_MAX_CONNECTIONS
              value: "100"

          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-backups
              mountPath: /backups
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2000m"

          livenessProbe:
            exec:
              command:
                - "sh"
                - "-c"
                - "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          readinessProbe:
            exec:
              command:
                - "sh"
                - "-c"
                - "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          startupProbe:
            exec:
              command:
                - "sh"
                - "-c"
                - "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30

          # Sécurité du conteneur
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # PostgreSQL nécessite écriture
            capabilities:
              drop:
                - ALL

      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
        - name: postgres-backups
          persistentVolumeClaim:
            claimName: postgres-backups
        - name: init-scripts
          configMap:
            name: postgres-init-scripts
            optional: true

      # Anti-affinity pour éviter co-localisation
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - redis
                        - minio
                        - rabbitmq
                topologyKey: kubernetes.io/hostname

      # Tolerations pour les nodes dédiés
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "database"
          effect: "NoSchedule"

  # Volume claim template pour StatefulSet
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 50Gi
---
# ============================================================================
# PostgreSQL Exporter — Sidecar pour métriques Prometheus
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: ireg-moto-bf-prod
  labels:
    app.kubernetes.io/name: postgres-exporter
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-exporter
        app.kubernetes.io/component: monitoring
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: exporter
          image: prometheuscommunity/postgres-exporter:v0.15.0
          env:
            - name: DATA_SOURCE_NAME
              valueFrom:
                secretKeyRef:
                  name: ireg-backend-secrets
                  key: database-url
          ports:
            - name: metrics
              containerPort: 9187
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
