# ============================================================================
# Redis — Deployment
# ============================================================================
# Cache + Sessions + Rate Limiting
# Persistence AOF activée
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: ireg-moto-bf-prod
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: ireg-moto-bf
    app.kubernetes.io/version: "7"
spec:
  replicas: 1  # Mode standalone ; pour HA utiliser Redis Sentinel ou Cluster
  strategy:
    type: Recreate  # Stateful, pas de rolling update
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/component: cache
        app.kubernetes.io/part-of: ireg-moto-bf
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9121"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP

          command:
            - "redis-server"
            - "--requirepass"
            - "$(REDIS_PASSWORD)"
            - "--maxmemory"
            - "512mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
            - "--appendonly"
            - "yes"
            - "--appendfsync"
            - "everysec"
            - "--save"
            - "900 1"
            - "--save"
            - "300 10"
            - "--save"
            - "60 10000"
            - "--tcp-keepalive"
            - "300"

          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ireg-backend-secrets
                  key: redis-password
            - name: TZ
              value: "Africa/Ouagadougou"

          volumeMounts:
            - name: redis-data
              mountPath: /data

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          livenessProbe:
            exec:
              command:
                - "sh"
                - "-c"
                - "redis-cli -a $REDIS_PASSWORD ping | grep PONG"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5

          readinessProbe:
            exec:
              command:
                - "sh"
                - "-c"
                - "redis-cli -a $REDIS_PASSWORD ping | grep PONG"
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          startupProbe:
            exec:
              command:
                - "sh"
                - "-c"
                - "redis-cli -a $REDIS_PASSWORD ping | grep PONG"
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-data

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - postgres
                topologyKey: kubernetes.io/hostname

      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "cache"
          effect: "NoSchedule"
          
---
# ============================================================================
# Redis Exporter — Métriques Prometheus
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: ireg-moto-bf-prod
  labels:
    app.kubernetes.io/name: redis-exporter
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis-exporter
        app.kubernetes.io/component: monitoring
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9121"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 59000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: exporter
          image: oliver006/redis_exporter:v1.58.0
          env:
            - name: REDIS_ADDR
              value: "redis://redis-service:6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ireg-backend-secrets
                  key: redis-password
          ports:
            - name: metrics
              containerPort: 9121
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "50m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
