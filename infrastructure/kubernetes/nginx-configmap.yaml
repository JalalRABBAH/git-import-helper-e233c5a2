# ============================================================================
# Nginx — ConfigMap (Configuration)
# ============================================================================
# Reverse proxy avec sécurité, rate limiting, compression
# TLS 1.3, en-têtes de sécurité HSTS
# ============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: ireg-moto-bf-prod
  labels:
    app.kubernetes.io/name: nginx
    app.kubernetes.io/component: config
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;

    events {
        worker_connections 1024;
        use epoll;
        multi_accept on;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        # Logging format JSON structuré
        log_format json_combined escape=json '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request":"$request",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"http_x_forwarded_for":"$http_x_forwarded_for",'
            '"upstream_response_time":"$upstream_response_time",'
            '"upstream_addr":"$upstream_addr"'
        '}';

        access_log /var/log/nginx/access.log json_combined;

        # Performance
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        types_hash_max_size 2048;
        client_max_body_size 50m;
        client_body_buffer_size 16k;
        client_header_buffer_size 4k;

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types
            text/plain
            text/css
            text/xml
            text/javascript
            application/json
            application/javascript
            application/xml+rss
            application/atom+xml
            image/svg+xml;

        # Rate limiting zones
        limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
        limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
        limit_conn_zone $binary_remote_addr zone=addr:10m;

        # Upstream backend
        upstream backend_api {
            least_conn;
            server backend-service:3000 max_fails=3 fail_timeout=30s;
            keepalive 32;
        }

        # Upstream frontend
        upstream frontend_web {
            server frontend-service:8080 max_fails=3 fail_timeout=30s;
            keepalive 32;
        }

        # Server block
        server {
            listen 8080;
            server_name _;
            root /usr/share/nginx/html;
            index index.html;

            # En-têtes de sécurité
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

            # Health check endpoint
            location /health {
                access_log off;
                return 200 "healthy\n";
                add_header Content-Type text/plain;
            }

            # API requests → Backend
            location /api/ {
                limit_req zone=api burst=20 nodelay;
                limit_conn addr 10;

                proxy_pass http://backend_api;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Request-ID $request_id;

                proxy_connect_timeout 30s;
                proxy_send_timeout 30s;
                proxy_read_timeout 30s;
                proxy_buffering on;
                proxy_buffer_size 4k;
                proxy_buffers 8 4k;
            }

            # Auth endpoints (rate limit plus strict)
            location /api/v1/auth/ {
                limit_req zone=auth burst=5 nodelay;
                limit_conn addr 5;

                proxy_pass http://backend_api;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;

                proxy_connect_timeout 15s;
                proxy_send_timeout 15s;
                proxy_read_timeout 15s;
            }

            # Metrics (accès interne uniquement)
            location /metrics {
                allow 172.20.0.0/16;  # Réseau monitoring uniquement
                deny all;
                proxy_pass http://backend_api;
            }

            # Static files → Frontend
            location / {
                try_files $uri $uri/ /index.html;
                expires 1h;
                add_header Cache-Control "public, immutable";
            }

            # Assets avec cache long
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }
    }
