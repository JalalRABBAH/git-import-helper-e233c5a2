# ============================================================================
# PostgreSQL — Service
# ============================================================================
# Service ClusterIP pour accès interne uniquement
# ============================================================================

apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: ireg-moto-bf-prod
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: ireg-moto-bf
  annotations:
    description: "Service PostgreSQL - Accès interne uniquement"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
  # Pas de publication de port externe (sécurité)
  publishNotReadyAddresses: false
  sessionAffinity: None
---
# Service pour l'exporter PostgreSQL
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter-service
  namespace: ireg-moto-bf-prod
  labels:
    app.kubernetes.io/name: postgres-exporter
    app.kubernetes.io/component: monitoring
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres-exporter
  ports:
    - name: metrics
      port: 9187
      targetPort: 9187
      protocol: TCP
