# ============================================================================
# Frontend — Service
# ============================================================================

apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: ireg-moto-bf-prod
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: ireg-moto-bf
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
