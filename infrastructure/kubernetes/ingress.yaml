# ============================================================================
# Ingress — Configuration avec cert-manager (TLS 1.3)
# ============================================================================
# Gestion automatique des certificats Let's Encrypt
# SSL/TLS strict avec redirection HTTP→HTTPS
# ============================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ireg-moto-bf-ingress
  namespace: ireg-moto-bf-prod
  labels:
    app.kubernetes.io/name: ireg-moto-bf
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: ireg-moto-bf
  annotations:
    # Cert-manager
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    cert-manager.io/acme-challenge-type: "http01"
    
    # Nginx Ingress Controller
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-protocols: "TLSv1.3"
    nginx.ingress.kubernetes.io/ssl-ciphers: "TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256"
    nginx.ingress.kubernetes.io/hsts: "true"
    nginx.ingress.kubernetes.io/hsts-max-age: "63072000"
    nginx.ingress.kubernetes.io/hsts-include-subdomains: "true"
    nginx.ingress.kubernetes.io/hsts-preload: "true"
    
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-connections: "5"
    nginx.ingress.kubernetes.io/limit-rpm: "200"
    
    # Proxy
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-buffering: "on"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "4k"
    nginx.ingress.kubernetes.io/proxy-buffers: "8 4k"
    
    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://ireg-motobf.bf,https://app.ireg-motobf.bf"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS, PATCH"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, X-Request-ID, X-Api-Key"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-max-age: "86400"
    
    # Monitoring
    prometheus.io/scrape: "true"
    prometheus.io/port: "10254"

spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ireg-motobf.bf
        - www.ireg-motobf.bf
        - api.ireg-motobf.bf
        - app.ireg-motobf.bf
      secretName: ireg-moto-bf-tls
  rules:
    # Domaine principal
    - host: ireg-motobf.bf
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-service
                port:
                  number: 80
    
    # Application web
    - host: app.ireg-motobf.bf
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 8080
    
    # API
    - host: api.ireg-motobf.bf
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 3000
    
    # Wildcard pour www
    - host: www.ireg-motobf.bf
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-service
                port:
                  number: 80

---
# ============================================================================
# ClusterIssuer — Let's Encrypt (Production)
# ============================================================================
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  namespace: cert-manager
  labels:
    app.kubernetes.io/name: cert-manager
    app.kubernetes.io/component: issuer
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@ireg-motobf.bf
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
            serviceType: ClusterIP
      # DNS-01 pour wildcard (optionnel)
      # - dns01:
      #     route53:
      #       region: af-south-1
      #       hostedZoneID: <ZONE_ID>
---
# ============================================================================
# ClusterIssuer — Let's Encrypt (Staging)
# ============================================================================
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  namespace: cert-manager
  labels:
    app.kubernetes.io/name: cert-manager
    app.kubernetes.io/component: issuer
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@ireg-motobf.bf
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
# ============================================================================
# Certificat explicite (optionnel - cert-manager gère aussi via ingress)
# ============================================================================
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ireg-moto-bf-cert
  namespace: ireg-moto-bf-prod
  labels:
    app.kubernetes.io/name: ireg-moto-bf
    app.kubernetes.io/component: tls
spec:
  secretName: ireg-moto-bf-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - ireg-motobf.bf
    - www.ireg-motobf.bf
    - api.ireg-motobf.bf
    - app.ireg-motobf.bf
  usages:
    - digital signature
    - key encipherment
    - server auth
  # Renouvellement automatique 30 jours avant expiration
  renewBefore: 720h  # 30 jours
  privateKey:
    algorithm: ECDSA
    size: 256
    encoding: PKCS8
