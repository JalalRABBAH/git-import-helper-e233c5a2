version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ireg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ireg_user
      POSTGRES_PASSWORD: ireg_password
      POSTGRES_DB: ireg_moto_bf
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ireg_user -d ireg_moto_bf"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ireg-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: ireg-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ireg_user
      RABBITMQ_DEFAULT_PASS: ireg_password
      RABBITMQ_DEFAULT_VHOST: ireg_vhost
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ireg-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: iregminio
      MINIO_ROOT_PASSWORD: iregminio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Worker services (for future scaling)
  # ireg-worker-reporting:
  #   build: .
  #   container_name: ireg-worker-reporting
  #   command: npm run worker:reporting
  #   depends_on:
  #     - postgres
  #     - redis
  #     - rabbitmq

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:

networks:
  default:
    name: ireg-network
